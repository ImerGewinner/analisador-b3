<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analisador B3</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>Analisador B3</h1>
        <p>Qualidade, liquidez e acompanhamento de mercado com dados públicos da B3.</p>
      </div>
      <div id="updated" class="muted">Carregando...</div>
    </header>

    <section class="cards">
      <article class="card"><span>Empresas</span><strong id="count">-</strong></article>
      <article class="card"><span>Elegíveis</span><strong id="eligible">-</strong></article>
      <article class="card"><span>Data-base</span><strong id="quoteDate">-</strong></article>
    </section>

    <section class="toolbar">
      <input id="q" type="search" placeholder="Buscar ticker ou empresa">
      <select id="filter">
        <option value="">Todos</option>
        <option value="SIM">Elegíveis</option>
        <option value="NÃO">Não elegíveis</option>
      </select>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticker</th><th>Empresa</th><th>Segmento</th><th>Preço</th>
            <th>Variação</th><th>Volume médio 20d</th><th>Pregões 20d</th>
            <th>Elegível</th><th>Motivo</th><th>Fonte</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </section>

    <footer id="disclaimer"></footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
