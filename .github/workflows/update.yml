name: Atualizar dados e publicar

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/update.yml"
      - "docs/*.html"
      - "docs/*.js"
      - "docs/*.css"
  schedule:
    # 01:37 UTC de terça a sábado = 21:37 de segunda a sexta em Manaus.
    - cron: "37 1 * * 2-6"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "analisador-b3-pages"
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Instalar dependências
        run: python -m pip install -r requirements.txt

      - name: Testar regras financeiras
        run: python -m unittest test_dividends.py test_advanced.py test_financial_sector.py

      - name: Atualizar mercado B3 e fundamentos CVM
        run: python run_pipeline.py

      - name: Reconciliar CNPJ e regenerar painel
        run: python fix_cnpj.py

      - name: Importar LPA por classe da DRE CVM
        run: python eps_loader.py

      - name: Atualizar proventos, payout, DY e Bazin
        run: python run_dividends_full_v2.py

      - name: Calcular Selic, P/L setorial, DCF e consistência
        run: python run_advanced_safe_v2.py

      - name: Integrar métricas regulatórias IFData
        continue-on-error: true
        run: python run_financial_sector_v2.py

      - name: Diagnosticar proventos e pendências
        run: python diagnose_dividends.py

      - name: Registrar banco e JSON atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analisador.db docs/data.json docs/status.json docs/dividends_diagnostics.json
          if git diff --cached --quiet; then
            echo "Sem alterações para registrar."
          else
            git commit -m "dados: atualização automática"
            git push
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
